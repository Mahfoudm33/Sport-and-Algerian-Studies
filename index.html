<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sport, Society & Culture in Algeria — Prof. Mahfoud Amara</title>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.css"/>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="shell">
    <header class="hdr">
        <div class="hdr-brand">
            <div class="flag"><div class="flag-g"></div><div class="flag-w"></div></div>
            <div>
                <h1 class="hdr-title">Sport, Society & Culture in Algeria</h1>
                <p class="hdr-sub">Digital Archive · Prof. Mahfoud Amara · Qatar University</p>
            </div>
        </div>
        <nav class="hdr-pills" id="pill-bar">
            <span class="pill" data-theme="Postcolonialism">Postcolonialism</span>
            <span class="pill" data-theme="National identity">National identity</span>
            <span class="pill" data-theme="Gender">Gender</span>
            <span class="pill" data-theme="Geopolitics">Geopolitics</span>
            <span class="pill" data-theme="Sport media">Sport media</span>
            <button class="pill pill-clear" id="clear-btn" style="display:none" onclick="clearTheme()">✕ Clear</button>
        </nav>
    </header>

    <main class="main-content">
        <div id="map"></div>
        <aside class="panel" id="panel">
            <div class="panel-empty" id="panel-empty">
                <div class="empty-icon">🗺️</div>
                <p>Select a city marker on the map to explore linked scholarly publications and research nodes across Algeria.</p>
            </div>
            <div id="panel-content" style="display:none; flex-direction:column; height:100%;">
                <div class="panel-hdr">
                    <span class="panel-city" id="city-label"></span>
                    <button class="close-btn" onclick="closePanel()">✕</button>
                </div>
                <div class="panel-body" id="panel-body"></div>
            </div>
        </aside>
    </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
/* ── Publication Database (All 12 References) ── */
const PUB = {
    algiers: {
        city: "Algiers", lat: 36.74, lon: 3.06, north: true,
        pubs: [
            { year: "2012", title: "Football Sub-Culture and Youth Politics in Algeria", ref: "Amara, M. (2012). Mediterranean Politics, 17(1), 41–58.", tags: ["National identity", "Youth politics"], bibtex: "@article{amara2012youth, title={Football Sub-Culture and Youth Politics in Algeria}, author={Amara, Mahfoud}, journal={Mediterranean Politics}, year={2012}}" },
            { year: "2021", title: "Moments and memories: football and state narratives in Algeria", ref: "Bouandel, Y. & Amara, M. (2021). Soccer & Society, 22(8), 1084–1094.", tags: ["National identity", "Postcolonialism"], bibtex: "@article{amara2021memories, title={Moments and memories}, author={Bouandel and Amara}, year={2021}}" },
            { year: "2011", title: "Football, the new battlefield of business in Algeria", ref: "Amara, M. (2011). Journal of North African Studies. DOI:10.1080/13629387.2010.536376", tags: ["Postcolonialism"], bibtex: "@article{amara2011business, title={Football, the new battlefield of business in Algeria}, author={Amara, M}, year={2011}}" },
            { year: "2022", title: "Football in Algeria from the 'Black Decade' to the Hirak", ref: "Amara, M. (2022). Middle East Report (MERIP), No. 304.", tags: ["National identity"], bibtex: "@article{amara2022merip, title={Football in Algeria from the Black Decade to the Hirak}, author={Amara, M}, year={2022}}" }
        ]
    },
    oran: {
        city: "Oran", lat: 35.70, lon: -0.64, north: true,
        pubs: [
            { year: "2022", title: "The 19th Mediterranean Games, Oran 2022 and ‘the New Algeria’", ref: "Amara, M. (2022). Asian Journal of Sport History & Culture, 1:3, 234-249.", tags: ["Geopolitics", "Mega-events"], bibtex: "@article{amara2022oran, title={The 19th Mediterranean Games, Oran 2022}, author={Amara, M}, year={2022}}" }
        ]
    },
    tiziouzou: {
        city: "Tizi Ouzou", lat: 36.71, lon: 4.05, north: true,
        pubs: [
            { year: "2025", title: "Imane Khelif: Women’s Boxing, Geopolitical Power and Gendered Media Narratives", ref: "Amara, M., Ahmad, N., & Hamidou, K. (2025). The International Spectator, 1–20.", tags: ["Gender", "Geopolitics", "Sport media"], bibtex: "@article{amara2025khelif, title={Imane Khelif}, author={Amara, M}, year={2025}}" },
            { year: "2025", title: "Ghada Mahat: whistling against the odds—female refereeing, gender dynamics, and resistance", ref: "Amara, M. (2025). Sport in Society, 1–16.", tags: ["Gender", "Postcolonialism"], bibtex: "@article{amara2025mahat, title={Ghada Mahat}, author={Amara, M}, year={2025}}" }
        ]
    },
    tlemcen: {
        city: "Tlemcen", lat: 34.88, lon: -1.31, north: true,
        pubs: [
            { year: "2022", title: "Algeria and the FIFA World Cup: political legitimization and regional rivalry", ref: "Amara, M. & Bouandel, Y. (2022). Soccer and Society, 23(7), 735–746.", tags: ["Geopolitics", "National identity"], bibtex: "@article{amara2022fifa, title={Algeria and the FIFA World Cup}, author={Amara, M}, year={2022}}" }
        ]
    },
    constantine: {
        city: "Constantine", lat: 36.36, lon: 6.61, north: true,
        pubs: [
            { year: "2025", title: "Living Football, Navigating Politics: Salah Assad’s Life Story", ref: "Amara, M. & Bouandel, Y. (2025). International Journal of the History of Sport.", tags: ["Postcolonialism", "National identity"], bibtex: "@article{amara2025assad, title={Living Football, Navigating Politics}, author={Amara, M}, year={2025}}" }
        ]
    },
    bejaia: {
        city: "Béjaïa", lat: 36.75, lon: 5.08, north: true,
        pubs: [
            { year: "2024", title: "Online Sources as Alternative Media for Sporting Events’ Consumption", ref: "Hamidou, K. & Amara, M. (2024). Asian Journal of Sport History & Culture, 3(1):1-21.", tags: ["Sport media"], bibtex: "@article{hamidou2024media, title={Online Sources as Alternative Media}, author={Hamidou and Amara}, year={2024}}" }
        ]
    },
    annaba: {
        city: "Annaba", lat: 36.90, lon: 7.76, north: true,
        pubs: [
            { year: "2006", title: "Soccer, Post-Colonial and Post-conflict Discourses: Algérie-France 2001", ref: "Amara, M. (2006). International Review of Modern Sociology, 32(2).", tags: ["Postcolonialism", "National identity"], bibtex: "@article{amara2006france, title={Soccer, Post-Colonial and Post-conflict Discourses}, author={Amara, M}, year={2006}}" }
        ]
    },
    tamanrasset: {
        city: "Tamanrasset", lat: 22.78, lon: 5.52, north: false,
        pubs: [
            { year: "2006", title: "Sport and Algerian Nationalism in the ‘Global’ era", ref: "Amara, M. (2006). Francophone and Postcolonial Studies (FPS), 4(1), 88-115.", tags: ["Postcolonialism", "National identity"], bibtex: "@article{amara2006global, title={Sport and Algerian Nationalism in the Global era}, author={Amara, M}, year={2006}}" }
        ]
    }
};

/* ── State & Map Management ── */
let activeTheme = null;
let activeCityId = null;
const markerRefs = {};

const map = L.map('map', { center: [28.0, 3.0], zoom: 5, minZoom: 4 });
L.tileLayer('https://tiles.stadiamaps.com/tiles/alidade_smooth/{z}/{x}/{y}{r}.png').addTo(map);

function getIcon(id, data, isActive = false) {
    const color = isActive ? '#b83820' : (data.north ? '#1a5fa8' : '#2e6b10');
    const badge = data.pubs.length > 1 ? `<div class="pub-count">${data.pubs.length}</div>` : '';
    return L.divIcon({
        className: '',
        html: `<div style="position:relative;">
                 <div class="city-marker" style="background:${color}">
                   <svg viewBox="0 0 24 24"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z"/></svg>
                 </div>
                 ${badge}
               </div>`,
        iconSize: [32, 32], iconAnchor: [16, 16]
    });
}

Object.entries(PUB).forEach(([id, data]) => {
    const marker = L.marker([data.lat, data.lon], { icon: getIcon(id, data) }).addTo(map);
    marker.bindTooltip(data.city, { className: 'city-tooltip', direction: 'top', offset: [0, -10] });
    marker.on('click', () => selectCity(id));
    markerRefs[id] = marker;
});

function selectCity(id) {
    if (activeCityId) markerRefs[activeCityId].setIcon(getIcon(activeCityId, PUB[activeCityId], false));
    activeCityId = id;
    markerRefs[id].setIcon(getIcon(id, PUB[id], true));
    map.flyTo([PUB[id].lat, PUB[id].lon], 6);
    renderPanel();
}

function renderPanel() {
    const data = PUB[activeCityId];
    document.getElementById('panel-empty').style.display = 'none';
    document.getElementById('panel-content').style.display = 'flex';
    document.getElementById('city-label').textContent = data.city;

    const html = data.pubs.map((p, idx) => `
        <article class="pub-card">
            <span class="pub-year">${p.year}</span>
            <h2 class="pub-title">${p.title}</h2>
            <p class="pub-ref">${p.ref}</p>
            <div class="tag-container">${p.tags.map(t => `<span class="tag ${t === activeTheme ? 'match' : ''}">${t}</span>`).join('')}</div>
            <div class="pub-actions">
                <button onclick="downloadBib('${activeCityId}', ${idx})" class="btn btn-bib">Cite (BibTeX)</button>
            </div>
        </article>
    `).join('<hr class="pub-divider">');

    document.getElementById('panel-body').innerHTML = html;
}

function downloadBib(cityId, idx) {
    const p = PUB[cityId].pubs[idx];
    const blob = new Blob([p.bibtex], { type: 'text/plain' });
    const url = window.URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `${cityId}_${p.year}.bib`;
    a.click();
}

function closePanel() {
    if (activeCityId) markerRefs[activeCityId].setIcon(getIcon(activeCityId, PUB[activeCityId], false));
    activeCityId = null;
    document.getElementById('panel-empty').style.display = 'flex';
    document.getElementById('panel-content').style.display = 'none';
    map.setView([28.0, 3.0], 5);
}

document.querySelectorAll('.pill[data-theme]').forEach(pill => {
    pill.addEventListener('click', () => {
        const theme = pill.dataset.theme;
        if (activeTheme === theme) return clearTheme();
        activeTheme = theme;
        document.querySelectorAll('.pill').forEach(p => p.classList.remove('on'));
        pill.classList.add('on');
        document.getElementById('clear-btn').style.display = 'inline-block';
        
        Object.entries(PUB).forEach(([id, data]) => {
            const hasMatch = data.pubs.some(p => p.tags.includes(theme));
            markerRefs[id].getElement().style.opacity = hasMatch ? '1' : '0.2';
        });
        if (activeCityId) renderPanel();
    });
});

function clearTheme() {
    activeTheme = null;
    document.querySelectorAll('.pill').forEach(p => p.classList.remove('on'));
    document.getElementById('clear-btn').style.display = 'none';
    Object.values(markerRefs).forEach(m => m.getElement().style.opacity = '1');
    if (activeCityId) renderPanel();
}
</script>
</body>
</html>
