<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sport, Society & Culture in Algeria — Prof. Mahfoud Amara</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.css"/>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="shell">
    <header class="hdr">
        <div class="hdr-brand">
            <div class="flag"><div class="flag-g"></div><div class="flag-w"></div></div>
            <div>
                <h1 class="hdr-title">Sport, Society & Culture in Algeria</h1>
                <p class="hdr-sub">Digital Archive · Prof. Mahfoud Amara · Qatar University</p>
            </div>
        </div>
        <nav class="hdr-pills" id="pill-bar">
            <span class="pill" data-theme="Postcolonialism">Postcolonialism</span>
            <span class="pill" data-theme="National identity">National Identity</span>
            <span class="pill" data-theme="Gender">Gender</span>
            <span class="pill" data-theme="Geopolitics">Geopolitics</span>
            <span class="pill" data-theme="Transition">Transition Economy</span>
            <button class="pill pill-clear" id="clear-btn" style="display:none" onclick="clearTheme()">✕ Clear</button>
        </nav>
    </header>

    <main class="main-content">
        <div id="map"></div>
        <aside class="panel" id="panel">
            <div class="panel-empty" id="panel-empty">
                <div class="empty-icon">🗺️</div>
                <p>Select a city marker to explore specific research on Algerian sport, colonial history, and sociopolitical transitions.</p>
            </div>
            <div id="panel-content" style="display:none; flex-direction:column; height:100%;">
                <div class="panel-hdr">
                    <span class="panel-city" id="city-label"></span>
                    <button class="close-btn" onclick="closePanel()">✕</button>
                </div>
                <div class="panel-body" id="panel-body"></div>
            </div>
        </aside>
    </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
/* ── THE COMPLETE BIBLIOGRAPHY (12 ENTRIES) ── */
const PUB = {
    algiers: {
        city: "Algiers", lat: 36.74, lon: 3.06, north: true,
        pubs: [
            { 
                year: "2012", title: "Football Sub-Culture and Youth Politics in Algeria", 
                ref: "Mediterranean Politics, 17(1), 41–58.", 
                summary: "Addresses state engagement with football through political transitions and the rise of fan chanting as a medium for protest.",
                contribution: "Links macro-political transitions to micro-level fan subcultures, showing how football stadiums act as barometers for youth political behavior.",
                tags: ["National identity", "Youth politics"] 
            },
            { 
                year: "2021", title: "Moments and memories: football and state narratives in Algeria", 
                ref: "Soccer & Society, 22(8), 1084–1094.", 
                summary: "Synthesizes the history of modern Algerian football as a cultural vehicle for resisting colonial hegemony and securing state legitimacy.",
                contribution: "Analyzes football as a 'transformative glocal process' that encompasses society's response to Western modernity and secular ideologies.",
                tags: ["National identity", "Postcolonialism"] 
            },
            { 
                year: "2011", title: "Football, the new battlefield of business in Algeria", 
                ref: "Journal of North African Studies, 16(3).", 
                summary: "Examines the 2010 World Cup qualifying crisis (Algeria-Egypt) and its impact on the private mobile telecom market.",
                contribution: "Provides a rare lens into Algeria's transition toward a market economy by highlighting the risks of associating corporate branding with sporting nationalism.",
                tags: ["Transition"] 
            },
            { 
                year: "2022", title: "Football from the 'Black Decade' to the Hirak", 
                ref: "Middle East Report (MERIP), No. 304.", 
                summary: "Traces how football mirrors social politics from the 1990s civil unrest through the 2019 mass protest movement.",
                contribution: "Identifies the adoption of 'Ultras' musical genres by Hirak protestors as a significant evolution in collective political expression.",
                tags: ["National identity", "Postcolonialism"] 
            }
        ]
    },
    oran: {
        city: "Oran", lat: 35.70, lon: -0.64, north: true,
        pubs: [{ 
            year: "2022", title: "The 19th Mediterranean Games, Oran 2022 and ‘the New Algeria’", 
            ref: "Asian Journal of Sport History & Culture, 1(3).", 
            summary: "Analyzes the Oran 2022 games as a symbolic platform for President Tebboune’s 'New Algeria' narrative.",
            contribution: "Uncovers the geopolitical context of regional mega-events in a post-Covid and post-Hirak environment.",
            tags: ["Geopolitics", "Mega-events"] 
        }]
    },
    tiziouzou: {
        city: "Tizi Ouzou", lat: 36.71, lon: 4.05, north: true,
        pubs: [
            { 
                year: "2025", title: "Imane Khelif: Women’s Boxing and Geopolitical Power", 
                ref: "The International Spectator, 1–20.", 
                summary: "Examines the media framing of boxer Imane Khelif at the Paris 2024 Olympics as a flashpoint for gender and postcolonial debates.",
                contribution: "Challenges Orientalist international media narratives by framing Khelif’s victory as an act of 'postcolonial agency' and cultural resistance.",
                tags: ["Gender", "Geopolitics"] 
            },
            { 
                year: "2025", title: "Ghada Mahat: Whistling Against the Odds", 
                ref: "Sport in Society, 1–16.", 
                summary: "Explores the historic role of Ghada Mahat as Algeria’s first female referee in a high-profile men’s match.",
                contribution: "Critically assesses the 'paradox of symbolic inclusion,' where visibility for women in sport does not always equate to meaningful structural change.",
                tags: ["Gender", "Postcolonialism"] 
            }
        ]
    },
    tlemcen: {
        city: "Tlemcen", lat: 34.88, lon: -1.31, north: true,
        pubs: [{ 
            year: "2022", title: "Algeria and the FIFA World Cup: Political Legitimization", 
            ref: "Soccer and Society, 23(7), 735–746.", 
            summary: "Divides Algeria's World Cup history into key political periods, focusing on the geopolitical rivalry with Egypt.",
            contribution: "Highlights the 'civilizational' project of nation-building in opposition to colonial narratives of Algeria as a French territory.",
            tags: ["Geopolitics", "National identity"] 
        }]
    },
    constantine: {
        city: "Constantine", lat: 36.36, lon: 6.61, north: true,
        pubs: [{ 
            year: "2025", title: "Living Football, Navigating Politics: Salah Assad’s Life Story", 
            ref: "Int. Journal of the History of Sport.", 
            summary: "Uses the biography of Salah Assad to explore the intersection of individual agency and structural forces.",
            contribution: "Employs a biographical lens to trace Algeria's transitions from 1970s socialism to the rise of political Islam and reconciliation.",
            tags: ["Postcolonialism", "National identity"] 
        }]
    },
    bejaia: {
        city: "Béjaïa", lat: 36.75, lon: 5.08, north: true,
        pubs: [{ 
            year: "2024", title: "Online Sources as Alternative Media Consumption", 
            ref: "Asian Journal of Sport History & Culture, 3(1).", 
            summary: "Investigates the use of IPTV and OTT platforms by Algerian fans to bypass official broadcasts.",
            contribution: "Applies TAM and UGT frameworks to explain how digital technologies democratize media consumption in non-Western contexts.",
            tags: ["Sport media"] 
        }]
    },
    annaba: {
        city: "Annaba", lat: 36.90, lon: 7.76, north: true,
        pubs: [{ 
            year: "2006", title: "Post-Colonial and Post-conflict Discourses: Algérie-France 2001", 
            ref: "International Review of Modern Sociology, 32(2).", 
            summary: "Analyzes the 2001 friendly match as a symbolic space for remembering the colonial past.",
            contribution: "Identifies sport as a lens for understanding national reconciliation and the identity negotiation of the 'Beur' diaspora.",
            tags: ["Postcolonialism", "National identity"] 
        }]
    },
    tamanrasset: {
        city: "Tamanrasset", lat: 22.78, lon: 5.52, north: false,
        pubs: [{ 
            year: "2006", title: "Sport and Algerian Nationalism in the ‘Global’ Era", 
            ref: "Francophone and Postcolonial Studies, 4(1).", 
            summary: "Discusses the influence of nationalist ideology on sport within 'Third World' contexts.",
            contribution: "Examines the 'brutal nationalization' of football after independence and its role in mapping Algeria as a postcolonial sovereign state.",
            tags: ["Postcolonialism", "National identity"] 
        }]
    }
};

/* ── Interactive Logic ── */
const map = L.map('map', { center: [28.0, 3.0], zoom: 5, minZoom: 4 });
L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
    attribution: '&copy; OpenStreetMap & CARTO'
}).addTo(map);

let activeCityId = null;
const markerRefs = {};

function getIcon(id, data, isActive = false) {
    const color = isActive ? '#b83820' : (data.north ? '#1a5fa8' : '#2e6b10');
    return L.divIcon({
        className: '',
        html: `<div class="city-marker" style="background:${color}"><svg viewBox="0 0 24 24"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z"/></svg></div>`,
        iconSize: [32, 32], iconAnchor: [16, 16]
    });
}

Object.entries(PUB).forEach(([id, data]) => {
    const marker = L.marker([data.lat, data.lon], { icon: getIcon(id, data) }).addTo(map);
    marker.on('click', () => {
        if (activeCityId) markerRefs[activeCityId].setIcon(getIcon(activeCityId, PUB[activeCityId], false));
        activeCityId = id;
        marker.setIcon(getIcon(id, data, true));
        map.flyTo([data.lat, data.lon], 6);
        renderPanel(data);
    });
    markerRefs[id] = marker;
});

function renderPanel(data) {
    document.getElementById('panel-empty').style.display = 'none';
    document.getElementById('panel-content').style.display = 'flex';
    document.getElementById('city-label').textContent = data.city;
    document.getElementById('panel-body').innerHTML = data.pubs.map(p => `
        <article class="pub-card">
            <span class="pub-year">${p.year}</span>
            <h2 class="pub-title">${p.title}</h2>
            <p class="pub-ref">${p.ref}</p>
            <div class="pub-sec"><strong>Brief Summary:</strong> ${p.summary}</div>
            <div class="pub-sec contribution"><strong>Contribution to Knowledge:</strong> ${p.contribution}</div>
        </article>
    `).join('<hr class="pub-divider">');
}

function closePanel() {
    if (activeCityId) markerRefs[activeCityId].setIcon(getIcon(activeCityId, PUB[activeCityId], false));
    activeCityId = null;
    document.getElementById('panel-empty').style.display = 'flex';
    document.getElementById('panel-content').style.display = 'none';
    map.setView([28.0, 3.0], 5);
}

document.querySelectorAll('.pill[data-theme]').forEach(pill => {
    pill.addEventListener('click', () => {
        const theme = pill.dataset.theme;
        Object.entries(PUB).forEach(([id, data]) => {
            const match = data.pubs.some(p => p.tags.includes(theme));
            markerRefs[id].getElement().style.opacity = match ? '1' : '0.2';
        });
        document.getElementById('clear-btn').style.display = 'inline';
    });
});

function clearTheme() {
    Object.values(markerRefs).forEach(m => m.getElement().style.opacity = '1');
    document.getElementById('clear-btn').style.display = 'none';
}
</script>
</body>
</html>
