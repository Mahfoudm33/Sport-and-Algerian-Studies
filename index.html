<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sport & Society in Algeria — Digital Archive</title>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.css"/>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="shell">
    <header class="hdr">
        <div class="hdr-brand">
            <div class="flag"><div class="flag-g"></div><div class="flag-w"></div></div>
            <div>
                <h1 class="hdr-title">Sport, Society & Culture in Algeria</h1>
                <p class="hdr-sub">Digital Archive · Prof. Mahfoud Amara</p>
            </div>
        </div>
        <div class="hdr-actions">
            <button onclick="downloadCSV()" class="btn-download">📊 Download List (CSV)</button>
            <nav class="hdr-pills">
                <span class="pill" data-theme="Postcolonialism">Postcolonialism</span>
                <span class="pill" data-theme="Geopolitics">Geopolitics</span>
                <span class="pill" data-theme="Gender">Gender</span>
                <button class="pill pill-clear" id="clear-btn" style="display:none" onclick="clearTheme()">✕ Clear</button>
            </nav>
        </div>
    </header>

    <main class="main-content">
        <div id="map"></div>
        <aside class="panel" id="panel">
            <div class="panel-empty" id="panel-empty">
                <p>Select a city marker to explore scholarly publications on Algerian sport and history.</p>
            </div>
            <div id="panel-content" style="display:none; flex-direction:column; height:100%;">
                <div class="panel-hdr">
                    <span class="panel-city" id="city-label"></span>
                    <button class="close-btn" onclick="closePanel()">✕</button>
                </div>
                <div class="panel-body" id="panel-body"></div>
            </div>
        </aside>
    </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

    annaba: {

            url: "https://www.jstor.org/stable/41307963",

            tags: ["Postcolonialism", "National identity"]
        }]
    },
    tamanrasset: {
        city: "Tamanrasset", lat: 22.78, lon: 5.52, north: false,
        pubs: [{ 
            year: "2006", title: "Sport and Algerian Nationalism in the ‘Global’ era",

            url: "https://doi.org/10.3828/fps.2006.4.1.88",
            summary: "Analyzes the tension between the Algerian nation-state's desire for territorial identity and the global flows of diaspora athletes.",
            contribution: "Argues that Algerian sport operates in a 'third space' between national sovereignty and globalized migration.",
            tags: ["Postcolonialism", "National identity"]
        }]
    }
};

/* ── MAP SETUP ── */
const map = L.map('map', { center: [28.0, 3.0], zoom: 5, minZoom: 4 });

// UPDATED MAP PROVIDER: Clear Delineation of Borders (OpenStreetMap Standard)
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '&copy; OpenStreetMap contributors'
}).addTo(map);

/* ── DOWNLOAD CSV FUNCTION ── */
function downloadCSV() {
    let csvContent = "data:text/csv;charset=utf-8,Year,City,Title,Journal/Reference,URL,Summary,Contribution\n";
    Object.values(PUB).forEach(cityData => {
        cityData.pubs.forEach(p => {
            let row = [
                p.year, 
                cityData.city, 
                `"${p.title.replace(/"/g, '""')}"`, 
                `"${p.ref.replace(/"/g, '""')}"`, 
                p.url, 
                `"${p.summary.replace(/"/g, '""')}"`, 
                `"${p.contribution.replace(/"/g, '""')}"`
            ].join(",");
            csvContent += row + "\n";
        });
    });
    const encodedUri = encodeURI(csvContent);
    const link = document.createElement("a");
    link.setAttribute("href", encodedUri);
    link.setAttribute("download", "Mahfoud_Amara_Publications.csv");
    document.body.appendChild(link);
    link.click();
}

/* ── UI Logic ── */
let activeCityId = null;
const markerRefs = {};

function getIcon(id, data, isActive = false) {
    const color = isActive ? '#b83820' : (data.north ? '#1a5fa8' : '#2e6b10');
    return L.divIcon({
        className: '',
        html: `<div class="city-marker" style="background:${color}"><svg viewBox="0 0 24 24"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z"/></svg></div>`,
        iconSize: [32, 32], iconAnchor: [16, 16]
    });
}

Object.entries(PUB).forEach(([id, data]) => {
    const marker = L.marker([data.lat, data.lon], { icon: getIcon(id, data) }).addTo(map);
    marker.on('click', () => {
        if (activeCityId) markerRefs[activeCityId].setIcon(getIcon(activeCityId, PUB[activeCityId], false));
        activeCityId = id;
        marker.setIcon(getIcon(id, data, true));
        map.flyTo([data.lat, data.lon], 6);
        renderPanel(data);
    });
    markerRefs[id] = marker;
});

function renderPanel(data) {
    document.getElementById('panel-empty').style.display = 'none';
    document.getElementById('panel-content').style.display = 'flex';
    document.getElementById('city-label').textContent = data.city;
    document.getElementById('panel-body').innerHTML = data.pubs.map(p => `
        <article class="pub-card">
            <span class="pub-year">${p.year}</span>
            <h2 class="pub-title">${p.title}</h2>
            <p class="pub-ref">${p.ref}</p>
            <div class="pub-sec"><strong>Extensive Summary:</strong> ${p.summary}</div>
            <div class="pub-sec contribution"><strong>Contribution to Knowledge:</strong> ${p.contribution}</div>
            <a href="${p.url}" target="_blank" class="btn-link">🔗 View Publication</a>
        </article>
    `).join('<hr class="pub-divider">');
}

function closePanel() {
    if (activeCityId) markerRefs[activeCityId].setIcon(getIcon(activeCityId, PUB[activeCityId], false));
    activeCityId = null;
    document.getElementById('panel-empty').style.display = 'flex';
    document.getElementById('panel-content').style.display = 'none';
    map.setView([28.0, 3.0], 5);
}

document.querySelectorAll('.pill[data-theme]').forEach(pill => {
    pill.addEventListener('click', () => {
        const theme = pill.dataset.theme;
        Object.entries(PUB).forEach(([id, data]) => {
            const match = data.pubs.some(p => p.tags.includes(theme));
            markerRefs[id].getElement().style.opacity = match ? '1' : '0.2';
        });
        document.getElementById('clear-btn').style.display = 'inline';
    });
});

function clearTheme() {
    Object.values(markerRefs).forEach(m => m.getElement().style.opacity = '1');
    document.getElementById('clear-btn').style.display = 'none';
}
</script>
</body>
</html>
