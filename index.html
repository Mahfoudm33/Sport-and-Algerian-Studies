<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sport, Society & Culture in Algeria — Digital Archive</title>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.css"/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;800&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --oxford: #1a5fa8; --desert: #fdfcf9; --sand: #f4f1ea;
            --green: #006233; --red: #b83820; --border: #e0ddd5;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        html, body { height: 100%; width: 100%; font-family: 'Inter', sans-serif; background: var(--desert); color: #1a1a1a; overflow: hidden; }
        .shell { display: flex; flex-direction: column; height: 100vh; width: 100vw; }
        
        /* Ecosystem Nav */
        .eco-nav { flex: 0 0 auto; background: #121212; color: #fff; padding: 8px 25px; border-bottom: 2px solid var(--oxford); z-index: 1000; }
        .eco-container { display: flex; justify-content: space-between; align-items: center; max-width: 1600px; margin: 0 auto; }
        .eco-label { font-size: 10px; font-weight: 800; color: #777; text-transform: uppercase; letter-spacing: 1px; }
        .eco-links { display: flex; gap: 20px; }
        .eco-links a { color: #fff; text-decoration: none; font-size: 11px; font-weight: 600; transition: 0.3s; }
        .eco-links a:hover { color: var(--oxford); }

        /* Header */
        .hdr { flex: 0 0 auto; padding: 18px 25px; background: #fff; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; z-index: 1000; }
        .hdr-brand { display: flex; align-items: center; gap: 15px; }
        .dz-flag { width: 34px; height: 22px; display: flex; border: 1px solid #ddd; border-radius: 2px; overflow: hidden; }
        .green { background: var(--green); flex: 1; }
        .white { background: #fff; flex: 1; }
        .hdr-title { font-family: 'Playfair Display', serif; font-size: 24px; color: #111; }
        .hdr-sub { font-size: 11px; font-weight: 600; color: #777; text-transform: uppercase; margin-top: 4px; letter-spacing: 0.5px; }
        .btn-export { background: var(--oxford); color: #fff; border: none; padding: 10px 18px; border-radius: 6px; font-size: 11px; font-weight: 800; cursor: pointer; transition: 0.2s; box-shadow: 0 2px 5px rgba(26,95,168,0.3); }
        .btn-export:hover { background: #144e8c; transform: translateY(-1px); }

        /* Filters */
        .filter-strip { flex: 0 0 auto; background: #fff; border-bottom: 1px solid var(--border); padding: 12px 25px; z-index: 1000; }
        .filter-scroll { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 4px; }
        .pill { padding: 6px 14px; background: var(--sand); border-radius: 20px; font-size: 11px; font-weight: 600; cursor: pointer; white-space: nowrap; border: 1px solid transparent; transition: 0.2s; color: #444; }
        .pill:hover { background: #e8e5de; }
        .pill.active { background: var(--oxford); color: #fff; }
        .pill-clear { background: transparent; border: none; color: var(--red); font-weight: 800; font-size: 11px; cursor: pointer; margin-left: 10px; }

        /* Main Content */
        .main-content { flex: 1 1 auto; display: flex; flex-direction: row; overflow: hidden; position: relative; }
        #map { flex: 1 1 auto; height: 100%; background: #dcd9d0; z-index: 1; }
        
        /* Sidebar */
        .panel { flex: 0 0 500px; width: 500px; background: #fff; border-left: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; z-index: 10; box-shadow: -4px 0 15px rgba(0,0,0,0.05); }
        .panel-empty { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 50px; text-align: center; color: #888; }
        .empty-art { font-size: 55px; margin-bottom: 20px; opacity: 0.4; }
        .panel-hdr { flex: 0 0 auto; padding: 20px 30px; background: #fbfbf9; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .panel-hdr h2 { font-size: 14px; text-transform: uppercase; letter-spacing: 1px; color: #333; font-weight: 800; }
        .close-panel { background: none; border: none; font-size: 22px; cursor: pointer; color: #aaa; transition: 0.2s; }
        .close-panel:hover { color: var(--red); }
        .panel-body { flex: 1 1 auto; overflow-y: auto; padding: 30px; scroll-behavior: smooth; }
